; Safety net adds boss-milestone guardrails on top of Wave scaling.ini.
; It is a bridge system:
; - Lower/easier groups can still appear in later phases.
; - Higher/harder groups are capped or softened until the boss milestones say the net can loosen.
; - After later boss waves, the net fades and the harder groups can take over.
;
; Section names are wave ranges.
; MaxGroup is the hardest bucket allowed in that range.
; <GroupName>Multiplier lowers a group's already-scaled probability in that range.
; A multiplier of 0 blocks that group for the range.
;
; Boss waves themselves are still skipped by the generator.

[Wave1-4]
MaxGroup=AboveAvarage
AboveAvarageMultiplier=40

[Wave6-9]
MaxGroup=Somewhatinthemiddle
SomewhatinthemiddleMultiplier=0

[Wave11-14]
MaxGroup=Unlikely
SomewhatinthemiddleMultiplier=80
UnlikelyMultiplier=35

[Wave16-19]
MaxGroup=Unlikely
UnlikelyMultiplier=65

[Wave21-24]
MaxGroup=VeryUnlikely
VeryUnlikelyMultiplier=35

[Wave26-29]
MaxGroup=VeryUnlikely
VeryUnlikelyMultiplier=60

[Wave31-34]
MaxGroup=Haveyouseenhim
VeryUnlikelyMultiplier=80
HaveyouseenhimMultiplier=20

[Wave36-39]
