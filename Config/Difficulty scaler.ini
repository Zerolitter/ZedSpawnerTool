; Difficulty scaler controls how many zed classes from each bucket may appear per wave.
; This runs after Wave scaling and Safety net, then before the optional MaxClassesPerWave ceiling.
;
; 0 blocks that group for the wave range.
; Higher values allow more class variety from that group.
; If a group has fewer available classes than the cap, all available classes are used.
;
; The idea: early waves have a small readable roster, later waves unlock more groups and more class slots.

