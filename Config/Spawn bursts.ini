; Spawn bursts create occasional hurdles by raising SpawnCountBase and SingleSpawnLimit.
; These are rolled per generated Spawn=(...) line, so the result is mixed: most lines stay normal,
; some lines become little pack spikes.
;
; Chance is percent.
; SpawnCountBaseBonus and SingleSpawnLimitBonus are added to the window values.
; MaxSpawnCountBase and MaxSingleSpawnLimit clamp the result.
;
; Boss waves are skipped by the generator, so these ranges only affect regular waves.

[Wave1-4]
Chance=0
SpawnCountBaseBonus=0
SingleSpawnLimitBonus=0
MaxSpawnCountBase=1
MaxSingleSpawnLimit=1

