; Wave scaling controls which probability buckets are allowed to appear as waves progress.
; This is the anti-wave-1-nightmare helper.
;
; UnlockWave:
;   Before this wave, the group is not written into the generated INI at all.
;
; FullWave:
;   The wave where this group reaches the normal probability from the tool window.
;   Between UnlockWave and FullWave, probability ramps from 25% to 100%.
;
; FadeStartWave / FadeEndWave / LateMultiplier:
;   Optional fade for easy groups. LateMultiplier is percent of normal probability.
;   Example: LateMultiplier=35 means 35% of the normal bucket probability at/after FadeEndWave.
;   Use FadeStartWave=0 and FadeEndWave=0 for no fade.

