; Spawn pacing is the stability bridge.
; It can override early wave timing and clamp pack sizes even when the tool window is set hotter.
;
; RelativeStart overrides the window value for the wave range.
; DelayMin / DelayMax randomize the Delay value per generated spawn line.
; MaxSpawnCountBase and MaxSingleSpawnLimit clamp the final value after Spawn bursts.
;
; The goal is to avoid wave 1 spawn-volume deadlocks, then let pressure ramp after the first boss.

[Wave1-4]
RelativeStart=2
DelayMin=3
DelayMax=5
MaxSpawnCountBase=1
MaxSingleSpawnLimit=1

