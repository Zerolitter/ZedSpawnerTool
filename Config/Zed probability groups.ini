; Probability groups for the KF zed spawner helper.
; Buckets are ordered as an easy-to-hard/common-to-rare scale.
; Local workshop check used:
; - Extra Zeds 2136782408: Script .u files and ZEDs/ZEDSx/PJZeds/Skeletal packages.
; - Zed Varients 938683482: ZedCustom.u and one-package-per-variant UPK names.
; - Zedternal Zeds 2811849367: CustomZeds.u and localization labels Tiny/Medium/Big/Huge/Ultra/Omega/Emperor/Predator.
;
; Suggested V2 pressure probabilities:
; VeryLikely=35-55
; AboveAvarage=30-48
; Somewhatinthemiddle=22-38
; Unlikely=16-30
; VeryUnlikely=8-18
; Haveyouseenhim=5-12
;
; Move names between buckets when your in-game taste says a zed belongs elsewhere.

